updates:
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"          
    open-pull-requests-limit: 5
    groups:
      android-deps:
        patterns:
          - "*"                   
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    labels:
      - "dependencies"
      - "android"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      rust-deps:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    labels:
      - "dependencies"
      - "rust"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions-deps:
        patterns:
          - "*"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "ci"
